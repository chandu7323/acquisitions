name: Lint and Format

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  lint-and-format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Prettier format check
        run: npm run format:check || { echo "::error title=Formatting Error::Code formatting issues found. Please run 'npm run format' locally and push again."; exit 1; }

      - name: Run ESLint
        run: npm run lint || { echo "::error title=Linting Error::Linting issues found. Please run 'npm run lint:fix' locally and push again."; exit 1; }
